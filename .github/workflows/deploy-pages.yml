name: Deploy ORDER LINE to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Configure Pages base path
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY#*/}" == *.github.io ]]; then
            echo "PAGES_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:github
        env:
          NEXT_PUBLIC_ORDERS_API_URL: ${{ vars.NEXT_PUBLIC_ORDERS_API_URL }}
          NEXT_PUBLIC_ORDERS_CSV_URL: ${{ vars.NEXT_PUBLIC_ORDERS_CSV_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
